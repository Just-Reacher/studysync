<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudySync — Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="icon" type="image/png" href="/images/favicon.ico">
  <link rel="manifest" href="/manifest.json">
  <script src="/js/studentGuard.js"></script>
<meta name="theme-color" content="#5B5BD6">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #5B5BD6; --primary-soft: #7C7CF0; --primary-pale: #EEEEFF;
      --accent: #22C9A5; --accent-pale: #E0FAF4;
      --text-dark: #1A1A2E; --text-mid: #4A4A72; --text-light: #8888AA;
      --bg: #F7F7FF; --bg-card: #FFFFFF;
      --border: rgba(91,91,214,0.12); --border-input: rgba(91,91,214,0.18);
      --shadow-sm: 0 2px 12px rgba(91,91,214,0.08);
      --shadow-md: 0 8px 32px rgba(91,91,214,0.12);
      --shadow-lg: 0 24px 64px rgba(91,91,214,0.16);
      --sidebar-w: 240px;
      --radius-sm: 10px; --radius-md: 16px; --radius-lg: 24px; --radius-xl: 32px;
      --error: #E05475; --success: #22C9A5;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-dark); min-height: 100vh; display: flex; overflow-x: hidden; }

    .bg-blob { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; opacity: 0.35; }
    .bg-blob--1 { width: 500px; height: 500px; background: radial-gradient(circle, #c5c5fa 0%, transparent 70%); top: -160px; left: -120px; }
    .bg-blob--2 { width: 360px; height: 360px; background: radial-gradient(circle, #a0f5e0 0%, transparent 70%); bottom: 40px; right: -80px; }

    /* ── SIDEBAR ── */
    .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w); background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 50; transition: transform 0.3s ease; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 24px 20px 20px; text-decoration: none; border-bottom: 1px solid var(--border); }
    .sidebar-logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--primary-soft)); border-radius: 9px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(91,91,214,0.3); }
    .sidebar-logo-icon i { color: #fff; font-size: 15px; }
    .sidebar-logo-text { font-family: 'Instrument Serif', serif; font-size: 20px; color: var(--text-dark); }
    .sidebar-logo-text span { color: var(--primary); }
    .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
    .nav-section-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); padding: 10px 10px 6px; margin-top: 6px; }
    .nav-item { display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: var(--radius-sm); text-decoration: none; font-size: 14px; color: var(--text-mid); transition: all 0.2s; position: relative; }
    .nav-item i { width: 18px; text-align: center; font-size: 15px; color: var(--text-light); transition: color 0.2s; }
    .nav-item:hover, .nav-item.active { background: var(--primary-pale); color: var(--primary); }
    .nav-item:hover i, .nav-item.active i { color: var(--primary); }
    .nav-item.active { font-weight: 500; }
    .nav-item.active::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px; background: var(--primary); border-radius: 0 3px 3px 0; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }
    .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.2s; }
    .sidebar-user:hover { background: var(--primary-pale); }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0; overflow: hidden; }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 13px; font-weight: 500; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 11px; color: var(--text-light); }
    .logout-btn { background: none; border: none; color: var(--text-light); cursor: pointer; font-size: 14px; padding: 4px; transition: color 0.2s; }
    .logout-btn:hover { color: var(--error); }

    /* ── MAIN ── */
    .main-content { margin-left: var(--sidebar-w); flex: 1; position: relative; z-index: 1; min-height: 100vh; }
    .topbar { position: sticky; top: 0; background: rgba(247,247,255,0.88); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 16px; z-index: 40; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .menu-toggle { display: none; background: none; border: none; color: var(--text-dark); font-size: 18px; cursor: pointer; padding: 6px; }
    .topbar-title { font-family: 'Instrument Serif', serif; font-size: 22px; color: var(--text-dark); letter-spacing: -0.3px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .icon-btn { width: 38px; height: 38px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-card); color: var(--text-mid); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.2s; text-decoration: none; }
    .icon-btn:hover { background: var(--primary-pale); color: var(--primary); }
    .page-body { padding: 32px; max-width: 1100px; }

    /* ── PAGE HEADER ── */
    .page-header { margin-bottom: 28px; }
    .page-title { font-family: 'Instrument Serif', serif; font-size: clamp(26px,3vw,36px); color: var(--text-dark); letter-spacing: -0.5px; margin-bottom: 4px; }
    .page-sub { font-size: 14px; color: var(--text-light); }

    /* ── SEARCH + FILTER BAR ── */
    .filter-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
    .search-wrap { flex: 1; min-width: 220px; position: relative; }
    .search-wrap i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-light); font-size: 13px; pointer-events: none; }
    .search-input { width: 100%; padding: 10px 14px 10px 38px; border: 1px solid var(--border-input); border-radius: var(--radius-sm); background: var(--bg-card); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-dark); outline: none; transition: border-color 0.2s, box-shadow 0.2s; box-shadow: var(--shadow-sm); }
    .search-input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(91,91,214,0.1); }
    .search-input::placeholder { color: var(--text-light); }
    .filter-select { padding: 10px 14px; border: 1px solid var(--border-input); border-radius: var(--radius-sm); background: var(--bg-card); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-dark); outline: none; cursor: pointer; transition: border-color 0.2s; box-shadow: var(--shadow-sm); }
    .filter-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(91,91,214,0.1); }
    .view-toggle { display: flex; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; box-shadow: var(--shadow-sm); }
    .view-btn { width: 38px; height: 38px; border: none; background: none; color: var(--text-light); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.2s; }
    .view-btn.active { background: var(--primary-pale); color: var(--primary); }
    .view-btn:hover:not(.active) { color: var(--primary); }

    /* ── SUBJECT TABS ── */
    .subject-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; }
    .subject-tab { display: flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 99px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-mid); font-family: 'DM Sans', sans-serif; transition: all 0.2s; box-shadow: var(--shadow-sm); white-space: nowrap; }
    .subject-tab i { font-size: 13px; }
    .subject-tab:hover { background: var(--primary-pale); color: var(--primary); border-color: rgba(91,91,214,0.2); }
    .subject-tab.active { color: #fff; border-color: transparent; box-shadow: 0 4px 14px rgba(91,91,214,0.28); }

    /* ── NOTES GRID / LIST ── */

    /* Grid view */
    .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

    /* List view */
    .notes-list { display: flex; flex-direction: column; gap: 10px; }

    /* ── NOTE CARD (grid) ── */
    .note-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 22px; box-shadow: var(--shadow-sm); transition: all 0.22s ease; cursor: pointer; display: flex; flex-direction: column; gap: 12px; position: relative; }
    .note-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: rgba(91,91,214,0.2); }

    .note-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .note-subj-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .note-card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
    .note-card:hover .note-card-actions { opacity: 1; }
    .note-action-btn { width: 28px; height: 28px; border-radius: 7px; border: none; background: none; color: var(--text-light); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.2s; }
    .note-action-btn:hover { background: var(--primary-pale); color: var(--primary); }
    .note-action-btn.delete:hover { background: #FFF0F3; color: var(--error); }
    .note-action-btn.bookmark.bookmarked { color: #F59E0B; }

    .note-title { font-size: 15px; font-weight: 500; color: var(--text-dark); line-height: 1.4; }
    .note-subject-label { font-size: 11px; color: var(--text-light); margin-top: 1px; }

    .note-preview { font-size: 13px; color: var(--text-mid); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    .note-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .note-tag { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 99px; background: var(--primary-pale); color: var(--primary); }

    .note-footer { display: flex; align-items: center; justify-content: space-between; }
    .note-date { font-size: 11px; color: var(--text-light); }
    .note-expand-btn { font-size: 11px; color: var(--primary); font-weight: 500; background: none; border: none; cursor: pointer; padding: 0; transition: opacity 0.2s; font-family: 'DM Sans', sans-serif; }
    .note-expand-btn:hover { opacity: 0.7; }

    /* ── NOTE ROW (list) ── */
    .note-row { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px 20px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 16px; cursor: pointer; transition: all 0.2s; }
    .note-row:hover { border-color: rgba(91,91,214,0.2); box-shadow: var(--shadow-md); transform: translateX(4px); }
    .note-row-icon { width: 38px; height: 38px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .note-row-info { flex: 1; min-width: 0; }
    .note-row-title { font-size: 14px; font-weight: 500; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-row-meta { font-size: 12px; color: var(--text-light); margin-top: 2px; }
    .note-row-actions { display: flex; gap: 4px; flex-shrink: 0; }

    /* ── EXPANDED NOTE MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(26,26,46,0.35); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }

    /* Note view modal */
    .note-view-modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 0; max-width: 680px; width: 100%; max-height: 88vh; box-shadow: var(--shadow-lg); animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1); display: flex; flex-direction: column; overflow: hidden; }
    @keyframes modalIn { from { opacity:0; transform:scale(0.93) translateY(14px); } to { opacity:1; transform:scale(1) translateY(0); } }

    .note-view-header { padding: 24px 28px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 14px; }
    .note-view-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .note-view-meta { flex: 1; }
    .note-view-title { font-family: 'Instrument Serif', serif; font-size: 22px; color: var(--text-dark); letter-spacing: -0.3px; margin-bottom: 4px; }
    .note-view-subject { font-size: 13px; color: var(--text-light); }
    .note-view-close { background: none; border: none; color: var(--text-light); cursor: pointer; font-size: 18px; padding: 4px; border-radius: 6px; transition: all 0.2s; flex-shrink: 0; }
    .note-view-close:hover { color: var(--text-dark); background: var(--primary-pale); }

    .note-view-body { padding: 24px 28px; overflow-y: auto; flex: 1; }
    .note-view-content { font-size: 14px; color: var(--text-mid); line-height: 1.8; white-space: pre-wrap; }
    .note-view-content h3 { font-family: 'Instrument Serif', serif; font-size: 18px; color: var(--text-dark); margin: 18px 0 8px; }
    .note-view-content strong { color: var(--text-dark); font-weight: 600; }

    .note-view-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

    /* Note edit modal */
    .note-edit-modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 36px 32px; max-width: 560px; width: 100%; box-shadow: var(--shadow-lg); animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1); max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-title { font-family: 'Instrument Serif', serif; font-size: 22px; color: var(--text-dark); letter-spacing: -0.3px; }
    .modal-close { background: none; border: none; color: var(--text-light); cursor: pointer; font-size: 18px; padding: 4px; border-radius: 6px; transition: all 0.2s; }
    .modal-close:hover { color: var(--text-dark); background: var(--primary-pale); }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-mid); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.4px; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 11px 14px; border: 1px solid var(--border-input); border-radius: var(--radius-sm); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-dark); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(91,91,214,0.1); }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--text-light); }
    .form-textarea { resize: vertical; min-height: 160px; line-height: 1.7; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-error { font-size: 11px; color: var(--error); margin-top: 5px; min-height: 15px; }

    .modal-footer { display: flex; gap: 10px; margin-top: 24px; }
    .btn-cancel { flex: 1; padding: 12px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-mid); transition: all 0.2s; }
    .btn-cancel:hover { background: var(--primary-pale); color: var(--primary); border-color: transparent; }
    .btn-save { flex: 2; padding: 12px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: linear-gradient(135deg, var(--primary), var(--primary-soft)); color: #fff; box-shadow: 0 4px 14px rgba(91,91,214,0.28); transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-save:hover { transform: translateY(-1px); }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-save .spinner { display: none; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    .btn-save.loading .btn-label { display: none; }
    .btn-save.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Delete modal */
    .delete-modal p { font-size: 14px; color: var(--text-mid); line-height: 1.6; margin-bottom: 24px; }
    .btn-delete { flex: 2; padding: 12px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: var(--error); color: #fff; transition: all 0.2s; }
    .btn-delete:hover { opacity: 0.88; transform: translateY(-1px); }

    /* FAB */
    .fab { position: fixed; bottom: 32px; right: 32px; width: 54px; height: 54px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-soft)); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 6px 24px rgba(91,91,214,0.38); transition: all 0.25s; z-index: 60; }
    .fab:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 10px 32px rgba(91,91,214,0.48); }

    /* Skeleton / empty */
    .skeleton { background: linear-gradient(90deg, var(--primary-pale) 25%, #e8e8ff 50%, var(--primary-pale) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
    @keyframes shimmer { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }
    .empty-state { text-align: center; padding: 56px 24px; color: var(--text-light); grid-column: 1 / -1; }
    .empty-state i { font-size: 36px; margin-bottom: 14px; display: block; opacity: 0.3; }
    .empty-state p { font-size: 14px; margin-bottom: 20px; }
    .btn-empty { padding: 11px 24px; background: linear-gradient(135deg, var(--primary), var(--primary-soft)); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 14px rgba(91,91,214,0.28); transition: all 0.2s; }
    .btn-empty:hover { transform: translateY(-1px); }

    /* Toast */
    .toast { position: fixed; bottom: 100px; right: 32px; background: var(--text-dark); color: #fff; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; z-index: 300; display: none; animation: toastIn 0.3s ease; box-shadow: var(--shadow-md); }
    .toast.show { display: flex; align-items: center; gap: 8px; }
    .toast.success { background: #0E9A7D; }
    .toast.error   { background: var(--error); }
    @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,46,0.3); z-index: 49; backdrop-filter: blur(2px); }
    .sidebar-overlay.show { display: block; }

    @media (max-width: 800px) { .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } .main-content { margin-left: 0; } .menu-toggle { display: block; } .topbar { padding: 0 20px; } .page-body { padding: 20px; } .fab { bottom: 20px; right: 20px; } }
    @media (max-width: 520px) { .filter-bar { flex-direction: column; align-items: stretch; } .form-row { grid-template-columns: 1fr; } .note-view-modal, .note-edit-modal { border-radius: var(--radius-lg); } .note-edit-modal { padding: 28px 20px; } }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  </style>
</head>

      <a href="progress.html"  class="nav-item"><i class="fa-solid fa-chart-line"></i> Progress</a>
      <a href="calendar.html"  class="nav-item"><i class="fa-solid fa-calendar-days"></i> Calendar</a>
      <a href="reminders.html" class="nav-item"><i class="fa-solid fa-bell"></i> Reminders</a>
      <span class="nav-section-label">Focus</span>
      <a href="pomodoro.html"  class="nav-item"><i class="fa-solid fa-clock"></i> Pomodoro</a>
      <span class="nav-section-label">Account</span>
      <a href="settings.html"  class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
       <a href="contact.html"  class="nav-item" aria-current="page"><i class="fa-solid fa-gear"></i> Contact</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar"></div>
        <div class="user-info">
          <div class="user-name" id="sidebarUserName">Loading…</div>
          <div class="user-role">Student</div>
        </div>
        <button class="logout-btn" id="logoutBtn" aria-label="Log out" title="Log out">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- MAIN -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar"><i class="fa-solid fa-bars"></i></button>
        <h1 class="topbar-title">Notes</h1>
      </div>
      <div class="topbar-right">
        <a href="dashboard.html" class="icon-btn" aria-label="Dashboard"><i class="fa-solid fa-house"></i></a>
        <a href="settings.html"  class="icon-btn" aria-label="Settings"><i class="fa-solid fa-gear"></i></a>
      </div>
    </header>

    <div class="page-body">
      <div class="page-header">
        <h2 class="page-title">Revision Notes</h2>
        <p class="page-sub" id="notesSubtitle">Loading your notes…</p>
      </div>

      <!-- Search + filters -->
      <div class="filter-bar">
        <div class="search-wrap">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          <input type="search" class="search-input" id="searchInput" placeholder="Search notes, keywords, tags…" aria-label="Search notes" />
        </div>
        <select class="filter-select" id="filterType" aria-label="Filter by note type">
          <option value="">All Types</option>
          <option value="summary">Summary</option>
          <option value="formula">Formulas</option>
          <option value="definition">Definitions</option>
          <option value="key-points">Key Points</option>
        </select>
        <select class="filter-select" id="filterBookmark" aria-label="Filter bookmarks">
          <option value="">All Notes</option>
          <option value="bookmarked">Bookmarked</option>
        </select>
        <div class="view-toggle" role="group" aria-label="View mode">
          <button class="view-btn active" id="viewGrid" aria-label="Grid view" title="Grid view"><i class="fa-solid fa-grip"></i></button>
          <button class="view-btn" id="viewList" aria-label="List view" title="List view"><i class="fa-solid fa-list"></i></button>
        </div>
      </div>

      <!-- Subject tabs -->
      <div class="subject-tabs" id="subjectTabs" role="tablist" aria-label="Filter by subject"></div>

      <!-- Notes container -->
      <div class="notes-container">
        <div class="notes-grid" id="notesGrid" aria-live="polite" aria-label="Notes"></div>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fabAdd" aria-label="Add note" title="Add note">
    <i class="fa-solid fa-plus"></i>
  </button>

  <!-- NOTE VIEW MODAL -->
  <div class="modal-overlay" id="viewModal" role="dialog" aria-modal="true" aria-labelledby="viewNoteTitle">
    <div class="note-view-modal">
      <div class="note-view-header">
        <div class="note-view-icon" id="viewNoteIcon"></div>
        <div class="note-view-meta">
          <h2 class="note-view-title" id="viewNoteTitle"></h2>
          <p class="note-view-subject" id="viewNoteSubject"></p>
        </div>
        <button class="note-view-close" id="viewModalClose" aria-label="Close note"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="note-view-body">
        <div class="note-view-content" id="viewNoteContent"></div>
        <div class="note-view-tags" id="viewNoteTags"></div>
      </div>
    </div>
  </div>

  <!-- NOTE EDIT MODAL -->
  <div class="modal-overlay" id="editModal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
    <div class="note-edit-modal">
      <div class="modal-header">
        <h2 class="modal-title" id="editModalTitle">New Note</h2>
        <button class="modal-close" id="editModalClose" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="noteForm" novalidate>
        <input type="hidden" id="noteId" />
        <div class="form-group">
          <label class="form-label" for="noteTitle">Title <span aria-hidden="true">*</span></label>
          <input type="text" class="form-input" id="noteTitle" placeholder="e.g. Quadratic Equations" required />
          <div class="form-error" id="titleError"></div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="noteSubject">Subject</label>
            <select class="form-select" id="noteSubject">
              <option value="Mathematics">Mathematics</option>
              <option value="English">English</option>
              <option value="ICT">ICT</option>
              <option value="Integrated Science">Integrated Science</option>
              <option value="Social Studies">Social Studies</option>
              <option value="Elective Physics">Elective Physics</option>
              <option value="Elective Biology">Elective Biology</option>
              <option value="Elective Chemistry">Elective Chemistry</option>
              <option value="Elective PEH">Elective PEH</option>
              <option value="Food and Nutrition">Food and Nutrition</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="noteType">Type</label>
            <select class="form-select" id="noteType">
              <option value="summary">Summary</option>
              <option value="formula">Formulas</option>
              <option value="definition">Definitions</option>
              <option value="key-points">Key Points</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="noteContent">Content <span aria-hidden="true">*</span></label>
          <textarea class="form-textarea" id="noteContent" placeholder="Write your revision notes here…" required></textarea>
          <div class="form-error" id="contentError"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="noteTags">Tags (comma separated)</label>
          <input type="text" class="form-input" id="noteTags" placeholder="e.g. algebra, equations, SHS2" />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" id="editBtnCancel">Cancel</button>
          <button type="submit" class="btn-save" id="editBtnSave">
            <span class="btn-label">Save Note</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- DELETE MODAL -->
  <div class="modal-overlay" id="deleteModal" role="dialog" aria-modal="true" aria-labelledby="deleteTitle">
    <div class="note-edit-modal delete-modal">
      <div class="modal-header">
        <h2 class="modal-title" id="deleteTitle" style="color:var(--error);"><i class="fa-solid fa-trash" style="font-size:18px;"></i> Delete Note</h2>
        <button class="modal-close" id="deleteModalClose" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <p id="deleteModalText">Are you sure you want to delete this note?</p>
      <div class="modal-footer">
        <button type="button" class="btn-cancel" id="deleteCancelBtn">Cancel</button>
        <button type="button" class="btn-delete" id="deleteConfirmBtn">Delete Note</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
<!-- In <head>, before any other <script> tags -->
<script src="/js/theme.js"></script>
  <script src="/js/notes.js"></script>
</body>
</html>
