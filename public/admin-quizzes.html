<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudySync Admin — Quizzes</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="icon" type="image/png" href="/images/favicon.ico">
  <link rel="manifest" href="/manifest.json">
  <script src="/js/adminGuard.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--primary:#5B5BD6;--primary-soft:#7C7CF0;--primary-pale:#EEEEFF;--accent:#22C9A5;--accent-pale:#E0FAF4;--text-dark:#1A1A2E;--text-mid:#4A4A72;--text-light:#8888AA;--bg:#F7F7FF;--bg-card:#FFFFFF;--border:rgba(91,91,214,0.12);--border-input:rgba(91,91,214,0.18);--shadow-sm:0 2px 12px rgba(91,91,214,0.08);--shadow-md:0 8px 32px rgba(91,91,214,0.12);--shadow-lg:0 24px 64px rgba(91,91,214,0.16);--sidebar-w:240px;--radius-sm:10px;--radius-md:16px;--radius-lg:24px;--radius-xl:32px;--error:#E05475;--success:#22C9A5;--warn:#F59E0B}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-dark);min-height:100vh;display:flex}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:#1A1A2E;display:flex;flex-direction:column;z-index:50;transition:transform 0.3s}
    .sidebar-logo{display:flex;align-items:center;gap:10px;padding:22px 20px;border-bottom:1px solid rgba(255,255,255,0.08);text-decoration:none}
    .sidebar-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--primary),var(--primary-soft));border-radius:8px;display:flex;align-items:center;justify-content:center}
    .sidebar-logo-icon i{color:#fff;font-size:14px}
    .sidebar-logo-text{font-family:'Instrument Serif',serif;font-size:18px;color:#fff}
    .sidebar-logo-text span{color:var(--primary-soft)}
    .admin-badge-side{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.4);margin-left:auto;background:rgba(255,255,255,0.08);padding:3px 8px;border-radius:99px}
    .sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
    .nav-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.3);padding:10px 10px 5px;margin-top:6px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);text-decoration:none;font-size:13px;color:rgba(255,255,255,0.6);transition:all 0.2s;position:relative}
    .nav-item i{width:16px;text-align:center;font-size:14px}
    .nav-item:hover{background:rgba(255,255,255,0.08);color:#fff}
    .nav-item.active{background:rgba(91,91,214,0.25);color:#fff;font-weight:500}
    .nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--primary-soft);border-radius:0 3px 3px 0}
    .sidebar-footer{padding:14px 10px;border-top:1px solid rgba(255,255,255,0.08)}
    .admin-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm)}
    .admin-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
    .admin-info{flex:1;min-width:0}
    .admin-name{font-size:12px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .admin-role{font-size:10px;color:rgba(255,255,255,0.4)}
    .logout-btn{background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:14px;padding:4px;transition:color 0.2s}
    .logout-btn:hover{color:var(--error)}
    .main-content{margin-left:var(--sidebar-w);flex:1;min-height:100vh}
    .topbar{position:sticky;top:0;background:rgba(247,247,255,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 32px;height:62px;display:flex;align-items:center;justify-content:space-between;z-index:40}
    .topbar-left{display:flex;align-items:center;gap:12px}
    .menu-toggle{display:none;background:none;border:none;color:var(--text-dark);font-size:18px;cursor:pointer}
    .topbar-title{font-family:'Instrument Serif',serif;font-size:20px;color:var(--text-dark)}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .page-body{padding:28px 32px;max-width:1200px}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
    .page-title{font-family:'Instrument Serif',serif;font-size:28px;color:var(--text-dark);letter-spacing:-0.4px}
    .page-sub{font-size:13px;color:var(--text-light);margin-top:3px}
    .btn-primary{padding:10px 20px;background:linear-gradient(135deg,var(--primary),var(--primary-soft));color:#fff;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 4px 14px rgba(91,91,214,0.28);transition:all 0.2s;text-decoration:none}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(91,91,214,0.38)}
    .btn-outline{padding:10px 20px;background:var(--bg-card);color:var(--text-mid);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all 0.2s}
    .btn-outline:hover{background:var(--primary-pale);color:var(--primary);border-color:transparent}
    .filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
    .search-wrap{flex:1;min-width:200px;position:relative}
    .search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-light);font-size:13px;pointer-events:none}
    .search-input{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--border-input);border-radius:var(--radius-sm);background:var(--bg-card);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-dark);outline:none;transition:border-color 0.2s;box-shadow:var(--shadow-sm)}
    .search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(91,91,214,0.1)}
    .filter-select{padding:10px 14px;border:1px solid var(--border-input);border-radius:var(--radius-sm);background:var(--bg-card);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-dark);outline:none;cursor:pointer;box-shadow:var(--shadow-sm)}
    .filter-select:focus{border-color:var(--primary)}
    .section-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:20px}
    .card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
    .card-title{font-size:14px;font-weight:500;color:var(--text-dark);display:flex;align-items:center;gap:8px}
    .card-title i{color:var(--primary);font-size:13px}
    .card-body{padding:18px 20px}
    .data-table{width:100%;border-collapse:collapse}
    .data-table th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-light);padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg)}
    .data-table td{font-size:13px;color:var(--text-dark);padding:12px 16px;border-bottom:1px solid var(--border)}
    .data-table tr:last-child td{border-bottom:none}
    .data-table tr:hover td{background:#fafafe}
    .badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px}
    .badge-active{background:var(--accent-pale);color:#0E9A7D}
    .badge-inactive{background:#FFF0F3;color:var(--error)}
    .badge-purple{background:var(--primary-pale);color:var(--primary)}
    .badge-amber{background:#FFF5E0;color:#D97706}
    .action-btns{display:flex;gap:5px}
    .action-btn{width:28px;height:28px;border-radius:7px;border:none;background:none;color:var(--text-light);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.2s}
    .action-btn:hover{background:var(--primary-pale);color:var(--primary)}
    .action-btn.danger:hover{background:#FFF0F3;color:var(--error)}
    .table-footer{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-top:1px solid var(--border);font-size:13px;color:var(--text-light)}
    .pagination{display:flex;gap:4px}
    .page-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-mid);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-family:'DM Sans',sans-serif}
    .page-btn:hover{background:var(--primary-pale);color:var(--primary)}
    .page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:12px;font-weight:500;color:var(--text-mid);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.4px}
    .form-input,.form-select,.form-textarea{width:100%;padding:11px 14px;border:1px solid var(--border-input);border-radius:var(--radius-sm);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text-dark);outline:none;transition:border-color 0.2s,box-shadow 0.2s}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(91,91,214,0.1)}
    .form-input::placeholder,.form-textarea::placeholder{color:var(--text-light)}
    .form-textarea{resize:vertical;min-height:100px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .modal-overlay{position:fixed;inset:0;background:rgba(26,26,46,0.35);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.show{display:flex}
    .modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:32px 28px;max-width:520px;width:100%;box-shadow:var(--shadow-lg);animation:modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);max-height:90vh;overflow-y:auto}
    @keyframes modalIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
    .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
    .modal-title{font-family:'Instrument Serif',serif;font-size:22px;color:var(--text-dark)}
    .modal-close{background:none;border:none;color:var(--text-light);cursor:pointer;font-size:16px;padding:4px;border-radius:6px}
    .modal-close:hover{background:var(--primary-pale);color:var(--primary)}
    .modal-footer{display:flex;gap:10px;margin-top:22px}
    .btn-cancel{flex:1;padding:11px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg-card);color:var(--text-mid);transition:all 0.2s}
    .btn-cancel:hover{background:var(--primary-pale);color:var(--primary);border-color:transparent}
    .btn-save{flex:2;padding:11px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;background:linear-gradient(135deg,var(--primary),var(--primary-soft));color:#fff;box-shadow:0 4px 14px rgba(91,91,214,0.28);transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-save:hover{transform:translateY(-1px)}
    .btn-save:disabled{opacity:0.6;cursor:not-allowed;transform:none}
    .btn-save .spinner{display:none;width:14px;height:14px;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite}
    .btn-save.loading .btn-label{display:none}
    .btn-save.loading .spinner{display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .skeleton{background:linear-gradient(90deg,var(--primary-pale) 25%,#e8e8ff 50%,var(--primary-pale) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .empty-state{text-align:center;padding:40px 24px;color:var(--text-light)}
    .empty-state i{font-size:28px;margin-bottom:10px;display:block;opacity:0.3}
    .empty-state p{font-size:13px}
    .toast{position:fixed;bottom:28px;right:28px;background:var(--text-dark);color:#fff;padding:12px 20px;border-radius:var(--radius-sm);font-size:13px;z-index:300;display:none;box-shadow:var(--shadow-md)}
    .toast.show{display:flex;align-items:center;gap:8px}
    .toast.success{background:#0E9A7D}
    .toast.error{background:var(--error)}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:49}
    .sidebar-overlay.show{display:block}
    @media(max-width:800px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main-content{margin-left:0}.menu-toggle{display:block}.topbar{padding:0 20px}.page-body{padding:20px}}
    @media(max-width:520px){.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<aside class="sidebar" id="sidebar">
    <a href="admin-dashboard.html" class="sidebar-logo">
      <div class="sidebar-logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
      <span class="sidebar-logo-text">Study<span>Sync</span></span>
      <span class="admin-badge-side">Admin</span>
    </a>
    <nav class="sidebar-nav"><span class="nav-section-label">Overview</span>
<a href="admin-dashboard.html" class="nav-item "><i class="fa-solid fa-house"></i> Dashboard</a>
<a href="admin-analytics.html" class="nav-item "><i class="fa-solid fa-chart-line"></i> Analytics</a>
<a href="admin-logs.html" class="nav-item "><i class="fa-solid fa-file-lines"></i> Logs</a>
<span class="nav-section-label">Users</span>
<a href="admin-users.html" class="nav-item "><i class="fa-solid fa-users"></i> All Users</a>
<span class="nav-section-label">Content</span>
<a href="admin-quizzes.html" class="nav-item active"><i class="fa-solid fa-brain"></i> Quizzes</a>
<a href="admin-questions.html" class="nav-item "><i class="fa-solid fa-circle-question"></i> Questions</a>
<a href="admin-notes.html" class="nav-item "><i class="fa-solid fa-book-open"></i> Notes</a>
<span class="nav-section-label">Communication</span>
<a href="admin-emails.html" class="nav-item "><i class="fa-solid fa-envelope"></i> Emails</a>
<span class="nav-section-label">System</span>
<a href="admin-settings.html" class="nav-item "><i class="fa-solid fa-gear"></i> Settings</a>
</nav>
    <div class="sidebar-footer">
      <div class="admin-user">
        <div class="admin-avatar" id="adminAvatar"></div>
        <div class="admin-info"><div class="admin-name" id="adminName">Admin</div><div class="admin-role">Administrator</div></div>
        <button class="logout-btn" id="logoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="main-content">
<header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle"><i class="fa-solid fa-bars"></i></button>
        <h1 class="topbar-title">Quizzes</h1>
      </div>
      <div class="topbar-right" id="topbarRight"></div>
    </header>
<div class="page-body">
      <div class="page-header">
        <div><h2 class="page-title">Quizzes</h2><p class="page-sub" id="quizCount">Loading…</p></div>
        <button class="btn-primary" id="btnAddQuiz"><i class="fa-solid fa-plus"></i> New Quiz</button>
      </div>
      <div class="filter-bar">
        <div class="search-wrap"><i class="fa-solid fa-magnifying-glass"></i><input type="search" class="search-input" id="searchInput" placeholder="Search quizzes…" /></div>
        <select class="filter-select" id="filterSubject">
          <option value="">All Subjects</option>
          <option value="Mathematics">Mathematics</option>
          <option value="English">English</option>
          <option value="ICT">ICT</option>
          <option value="Integrated Science">Integrated Science</option>
          <option value="Social Studies">Social Studies</option>
          <option value="Elective Physics">Elective Physics</option>
          <option value="Elective Biology">Elective Biology</option>
          <option value="Elective Chemistry">Elective Chemistry</option>
          <option value="Elective PEH">Elective PEH</option>
          <option value="Food and Nutrition">Food and Nutrition</option>
        </select>
        <select class="filter-select" id="filterLevel">
          <option value="">All Levels</option>
          <option value="SHS1">SHS 1</option>
          <option value="SHS2">SHS 2</option>
          <option value="SHS3">SHS 3</option>
        </select>
      </div>
      <div class="section-card">
        <table class="data-table">
          <thead><tr><th>Title</th><th>Subject</th><th>Level</th><th>Questions</th><th>Time</th><th>Attempts</th><th>Avg Score</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="quizzesTbody"></tbody>
        </table>
        <div class="table-footer"><span id="tableInfo">—</span><div class="pagination" id="pagination"></div></div>
      </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="quizModal">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title" id="quizModalTitle">New Quiz</h2>
          <button class="modal-close" id="quizModalClose"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form id="quizForm" novalidate>
          <input type="hidden" id="quizId" />
          <div class="form-group"><label class="form-label">Title *</label><input type="text" class="form-input" id="quizTitle" placeholder="e.g. Basic Algebra" required /></div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Subject *</label>
              <select class="form-select" id="quizSubject">
                <option value="Mathematics">Mathematics</option>
                <option value="English">English</option>
                <option value="ICT">ICT</option>
                <option value="Integrated Science">Integrated Science</option>
                <option value="Social Studies">Social Studies</option>
                <option value="Elective Physics">Elective Physics</option>
                <option value="Elective Biology">Elective Biology</option>
                <option value="Elective Chemistry">Elective Chemistry</option>
                <option value="Elective PEH">Elective PEH</option>
                <option value="Food and Nutrition">Food and Nutrition</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Level *</label>
              <select class="form-select" id="quizLevel"><option value="SHS1">SHS 1</option><option value="SHS2">SHS 2</option><option value="SHS3">SHS 3</option></select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Timed?</label>
              <select class="form-select" id="quizTimed"><option value="true">Yes</option><option value="false">No</option></select>
            </div>
            <div class="form-group"><label class="form-label">Time Limit (min)</label><input type="number" class="form-input" id="quizTimeLimit" value="10" min="1" max="120" /></div>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-select" id="quizActive"><option value="true">Active</option><option value="false">Inactive</option></select>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn-cancel" id="quizBtnCancel">Cancel</button>
            <button type="submit" class="btn-save" id="quizBtnSave"><span class="btn-label">Save Quiz</span><span class="spinner"></span></button>
          </div>
        </form>
      </div>
    </div>
</div>
<div class="toast" id="toast"></div>
<script src="/js/theme.js"></script>
  <script src="/js/admin-quizzes.js"></script>
</body>
</html>
