<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudySync — Quiz Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="icon" type="image/png" href="/images/favicon.ico">
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B5BD6">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #5B5BD6; --primary-soft: #7C7CF0; --primary-pale: #EEEEFF;
      --accent: #22C9A5; --accent-pale: #E0FAF4;
      --text-dark: #1A1A2E; --text-mid: #4A4A72; --text-light: #8888AA;
      --bg: #F7F7FF; --bg-card: #FFFFFF;
      --border: rgba(91,91,214,0.12); --border-input: rgba(91,91,214,0.18);
      --shadow-sm: 0 2px 12px rgba(91,91,214,0.08); --shadow-md: 0 8px 32px rgba(91,91,214,0.12);
      --sidebar-w: 240px; --radius-sm: 10px; --radius-md: 16px; --radius-lg: 24px; --radius-xl: 32px;
      --error: #E05475; --success: #22C9A5;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-dark); min-height: 100vh; display: flex; overflow-x: hidden; }

    .bg-blob { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; opacity: 0.35; }
    .bg-blob--1 { width: 500px; height: 500px; background: radial-gradient(circle, #c5c5fa 0%, transparent 70%); top: -160px; left: -120px; }
    .bg-blob--2 { width: 360px; height: 360px; background: radial-gradient(circle, #a0f5e0 0%, transparent 70%); bottom: 40px; right: -80px; }

    /* SIDEBAR */
    .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w); background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 50; transition: transform 0.3s ease; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 24px 20px 20px; text-decoration: none; border-bottom: 1px solid var(--border); }
    .sidebar-logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--primary-soft)); border-radius: 9px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(91,91,214,0.3); }
    .sidebar-logo-icon i { color: #fff; font-size: 15px; }
    .sidebar-logo-text { font-family: 'Instrument Serif', serif; font-size: 20px; color: var(--text-dark); }
    .sidebar-logo-text span { color: var(--primary); }
    .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
    .nav-section-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); padding: 10px 10px 6px; margin-top: 6px; }
    .nav-item { display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: var(--radius-sm); text-decoration: none; font-size: 14px; color: var(--text-mid); transition: all 0.2s; position: relative; }
    .nav-item i { width: 18px; text-align: center; font-size: 15px; color: var(--text-light); transition: color 0.2s; }
    .nav-item:hover, .nav-item.active { background: var(--primary-pale); color: var(--primary); }
    .nav-item:hover i, .nav-item.active i { color: var(--primary); }
    .nav-item.active { font-weight: 500; }
    .nav-item.active::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px; background: var(--primary); border-radius: 0 3px 3px 0; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }
    .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.2s; }
    .sidebar-user:hover { background: var(--primary-pale); }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0; overflow: hidden; }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 13px; font-weight: 500; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 11px; color: var(--text-light); }
    .logout-btn { background: none; border: none; color: var(--text-light); cursor: pointer; font-size: 14px; padding: 4px; transition: color 0.2s; }
    .logout-btn:hover { color: var(--error); }

    /* MAIN */
    .main-content { margin-left: var(--sidebar-w); flex: 1; position: relative; z-index: 1; min-height: 100vh; }
    .topbar { position: sticky; top: 0; background: rgba(247,247,255,0.88); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; z-index: 40; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .menu-toggle { display: none; background: none; border: none; color: var(--text-dark); font-size: 18px; cursor: pointer; padding: 6px; }
    .topbar-title { font-family: 'Instrument Serif', serif; font-size: 22px; color: var(--text-dark); letter-spacing: -0.3px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .icon-btn { width: 38px; height: 38px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-card); color: var(--text-mid); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.2s; text-decoration: none; }
    .icon-btn:hover { background: var(--primary-pale); color: var(--primary); }
    .page-body { padding: 32px; max-width: 800px; }

    /* REVIEW HEADER */
    .review-header { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; flex-wrap: wrap; }
    .back-btn { display: flex; align-items: center; gap: 7px; background: none; border: none; color: var(--text-mid); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; padding: 0; transition: color 0.2s; text-decoration: none; }
    .back-btn:hover { color: var(--primary); }

    /* SCORE SUMMARY CARD */
    .score-summary { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-soft) 100%); border-radius: var(--radius-lg); padding: 28px 32px; color: #fff; margin-bottom: 28px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; box-shadow: 0 8px 28px rgba(91,91,214,0.3); }
    .score-summary-main { flex: 1; }
    .score-summary-title { font-family: 'Instrument Serif', serif; font-size: 22px; margin-bottom: 4px; }
    .score-summary-sub { font-size: 13px; opacity: 0.75; }
    .score-summary-pct { font-family: 'Instrument Serif', serif; font-size: 52px; line-height: 1; }
    .score-summary-label { font-size: 12px; opacity: 0.7; margin-top: 2px; text-align: center; }

    .score-chips { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    .score-chip { display: flex; align-items: center; gap: 6px; padding: 7px 14px; background: rgba(255,255,255,0.15); border-radius: 99px; font-size: 12px; }
    .score-chip i { font-size: 11px; }

    /* FILTER TABS */
    .review-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .review-tab { padding: 8px 16px; border-radius: 99px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-mid); transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .review-tab:hover { background: var(--primary-pale); color: var(--primary); }
    .review-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* REVIEW ITEMS */
    .review-list { display: flex; flex-direction: column; gap: 16px; }

    .review-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 24px; box-shadow: var(--shadow-sm); }
    .review-item.correct { border-left: 4px solid var(--accent); }
    .review-item.wrong   { border-left: 4px solid var(--error); }
    .review-item.skipped { border-left: 4px solid #F59E0B; }

    .review-item-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .review-q-num { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-light); }
    .review-status-badge { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 99px; flex-shrink: 0; }
    .badge-correct { background: var(--accent-pale); color: #0E9A7D; }
    .badge-wrong   { background: #FFF0F3; color: var(--error); }
    .badge-skipped { background: #FFF5E0; color: #D97706; }

    .review-q-text { font-size: 15px; color: var(--text-dark); line-height: 1.5; margin-bottom: 16px; }

    .review-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .review-option { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); font-size: 13px; }
    .review-option.is-correct { background: var(--accent-pale); border-color: rgba(34,201,165,0.3); color: #0E9A7D; }
    .review-option.is-wrong   { background: #FFF0F3; border-color: rgba(224,84,117,0.3); color: var(--error); }
    .review-option-letter { width: 24px; height: 24px; border-radius: 6px; background: rgba(91,91,214,0.1); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .review-option.is-correct .review-option-letter { background: var(--accent); color: #fff; }
    .review-option.is-wrong .review-option-letter   { background: var(--error); color: #fff; }

    .review-explanation { padding: 12px 16px; background: var(--primary-pale); border-radius: var(--radius-sm); font-size: 13px; color: var(--text-mid); line-height: 1.6; }
    .review-explanation strong { color: var(--primary); display: block; margin-bottom: 3px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; }

    /* Actions */
    .review-actions { display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap; }
    .btn-action { flex: 1; min-width: 140px; padding: 12px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; text-align: center; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-soft)); color: #fff; box-shadow: 0 4px 14px rgba(91,91,214,0.28); }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-outline { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-mid); }
    .btn-outline:hover { background: var(--primary-pale); color: var(--primary); }

    .empty-state { text-align: center; padding: 40px 24px; color: var(--text-light); }
    .empty-state i { font-size: 28px; margin-bottom: 10px; display: block; opacity: 0.35; }

    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,46,0.3); z-index: 49; backdrop-filter: blur(2px); }
    .sidebar-overlay.show { display: block; }

    @media (max-width: 800px) { .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } .main-content { margin-left: 0; } .menu-toggle { display: block; } .topbar { padding: 0 20px; } .page-body { padding: 20px; } }
    @media (max-width: 520px) { .score-summary { flex-direction: column; text-align: center; } .score-chips { justify-content: center; } }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  </style>
</head>
<body>
  <div class="bg-blob bg-blob--1" aria-hidden="true"></div>
  <div class="bg-blob bg-blob--2" aria-hidden="true"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
    <a href="dashboard.html" class="sidebar-logo">
      <div class="sidebar-logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
      <span class="sidebar-logo-text">Study<span>Sync</span></span>
    </a>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Main</span>
      <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
      <a href="quizzes.html"   class="nav-item active" aria-current="page"><i class="fa-solid fa-brain"></i> Quizzes</a>
      <a href="notes.html"     class="nav-item"><i class="fa-solid fa-book-open"></i> Notes</a>
      <a href="tasks.html"     class="nav-item"><i class="fa-solid fa-list-check"></i> Tasks</a>
      <span class="nav-section-label">Track</span>
      <a href="progress.html"  class="nav-item"><i class="fa-solid fa-chart-line"></i> Progress</a>
      <a href="calendar.html"  class="nav-item"><i class="fa-solid fa-calendar-days"></i> Calendar</a>
      <a href="reminders.html" class="nav-item"><i class="fa-solid fa-bell"></i> Reminders</a>
      <span class="nav-section-label">Focus</span>
      <a href="pomodoro.html"  class="nav-item"><i class="fa-solid fa-clock"></i> Pomodoro</a>
      <span class="nav-section-label">Account</span>
      <a href="settings.html"  class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar"></div>
        <div class="user-info">
          <div class="user-name" id="sidebarUserName">Loading…</div>
          <div class="user-role">Student</div>
        </div>
        <button class="logout-btn" id="logoutBtn" aria-label="Log out">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- MAIN -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar"><i class="fa-solid fa-bars"></i></button>
        <h1 class="topbar-title">Quiz Review</h1>
      </div>
      <div class="topbar-right">
        <a href="dashboard.html" class="icon-btn" aria-label="Dashboard"><i class="fa-solid fa-house"></i></a>
        <a href="settings.html"  class="icon-btn" aria-label="Settings"><i class="fa-solid fa-gear"></i></a>
      </div>
    </header>

    <div class="page-body">
      <div class="review-header">
        <a href="quizzes.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Quizzes</a>
      </div>

      <!-- Score summary -->
      <div class="score-summary" id="scoreSummary" aria-live="polite">
        <div class="score-summary-main">
          <div class="score-summary-title" id="reviewQuizTitle">Loading…</div>
          <div class="score-summary-sub"   id="reviewQuizSub"></div>
          <div class="score-chips" id="scoreChips"></div>
        </div>
        <div>
          <div class="score-summary-pct" id="reviewPct">—</div>
          <div class="score-summary-label">Score</div>
        </div>
      </div>

      <!-- Filter tabs -->
      <div class="review-tabs" role="tablist" aria-label="Filter review answers">
        <button class="review-tab active" data-filter="all"     role="tab" aria-selected="true">All</button>
        <button class="review-tab"        data-filter="correct" role="tab">Correct</button>
        <button class="review-tab"        data-filter="wrong"   role="tab">Wrong</button>
        <button class="review-tab"        data-filter="skipped" role="tab">Skipped</button>
      </div>

      <!-- Review list -->
      <div class="review-list" id="reviewList" aria-live="polite"></div>

      <!-- Actions -->
      <div class="review-actions" id="reviewActions">
        <a href="quizzes.html" class="btn-action btn-outline">
          <i class="fa-solid fa-arrow-left"></i> All Quizzes
        </a>
        <button class="btn-action btn-primary" id="btnRetake">
          <i class="fa-solid fa-rotate-right"></i> Retake Quiz
        </button>
      </div>
    </div>
  </div>

  <script src="../js/quiz-review.js"></script>
</body>
</html>
