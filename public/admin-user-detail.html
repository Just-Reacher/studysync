<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudySync Admin — User Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--primary:#5B5BD6;--primary-soft:#7C7CF0;--primary-pale:#EEEEFF;--accent:#22C9A5;--accent-pale:#E0FAF4;--text-dark:#1A1A2E;--text-mid:#4A4A72;--text-light:#8888AA;--bg:#F7F7FF;--bg-card:#FFFFFF;--border:rgba(91,91,214,0.12);--shadow-sm:0 2px 12px rgba(91,91,214,0.08);--shadow-md:0 8px 32px rgba(91,91,214,0.12);--sidebar-w:240px;--radius-sm:10px;--radius-md:16px;--radius-lg:24px;--error:#E05475;--success:#22C9A5;--warn:#F59E0B}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-dark);min-height:100vh;display:flex}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:#1A1A2E;display:flex;flex-direction:column;z-index:50}
    .sidebar-logo{display:flex;align-items:center;gap:10px;padding:22px 20px;border-bottom:1px solid rgba(255,255,255,0.08);text-decoration:none}
    .sidebar-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--primary),var(--primary-soft));border-radius:8px;display:flex;align-items:center;justify-content:center}
    .sidebar-logo-icon i{color:#fff;font-size:14px}
    .sidebar-logo-text{font-family:'Instrument Serif',serif;font-size:18px;color:#fff}
    .sidebar-logo-text span{color:var(--primary-soft)}
    .admin-badge-side{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.4);margin-left:auto;background:rgba(255,255,255,0.08);padding:3px 8px;border-radius:99px}
    .sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
    .nav-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.3);padding:10px 10px 5px;margin-top:6px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);text-decoration:none;font-size:13px;color:rgba(255,255,255,0.6);transition:all 0.2s;position:relative}
    .nav-item i{width:16px;text-align:center;font-size:14px}
    .nav-item:hover{background:rgba(255,255,255,0.08);color:#fff}
    .nav-item.active{background:rgba(91,91,214,0.25);color:#fff;font-weight:500}
    .nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--primary-soft);border-radius:0 3px 3px 0}
    .sidebar-footer{padding:14px 10px;border-top:1px solid rgba(255,255,255,0.08)}
    .admin-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm)}
    .admin-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
    .admin-info{flex:1;min-width:0}
    .admin-name{font-size:12px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .admin-role{font-size:10px;color:rgba(255,255,255,0.4)}
    .logout-btn{background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:14px;padding:4px;transition:color 0.2s}
    .logout-btn:hover{color:var(--error)}
    .main-content{margin-left:var(--sidebar-w);flex:1;min-height:100vh}
    .topbar{position:sticky;top:0;background:rgba(247,247,255,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 32px;height:62px;display:flex;align-items:center;justify-content:space-between;z-index:40}
    .topbar-left{display:flex;align-items:center;gap:12px}
    .menu-toggle{display:none;background:none;border:none;color:var(--text-dark);font-size:18px;cursor:pointer}
    .topbar-title{font-family:'Instrument Serif',serif;font-size:20px;color:var(--text-dark)}
    .back-btn{display:flex;align-items:center;gap:7px;background:none;border:none;color:var(--text-mid);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;padding:0;text-decoration:none;transition:color 0.2s}
    .back-btn:hover{color:var(--primary)}
    .page-body{padding:28px 32px;max-width:1000px}
    .profile-card{background:linear-gradient(135deg,var(--primary),var(--primary-soft));border-radius:var(--radius-lg);padding:28px 32px;color:#fff;margin-bottom:24px;display:flex;align-items:center;gap:20px;box-shadow:0 8px 28px rgba(91,91,214,0.28)}
    .profile-avatar{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.2);border:3px solid rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:600;flex-shrink:0;overflow:hidden}
    .profile-avatar img{width:100%;height:100%;object-fit:cover}
    .profile-info{flex:1}
    .profile-name{font-family:'Instrument Serif',serif;font-size:24px;margin-bottom:4px}
    .profile-email{font-size:13px;opacity:0.8}
    .profile-meta{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
    .profile-chip{font-size:11px;padding:4px 12px;background:rgba(255,255,255,0.15);border-radius:99px}
    .profile-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
    .btn-action{padding:9px 16px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all 0.2s}
    .btn-warn{background:rgba(245,158,11,0.2);color:#FBBF24}
    .btn-warn:hover{background:#F59E0B;color:#fff}
    .btn-danger{background:rgba(224,84,117,0.2);color:#FF9BB2}
    .btn-danger:hover{background:var(--error);color:#fff}
    .btn-neutral{background:rgba(255,255,255,0.15);color:#fff}
    .btn-neutral:hover{background:rgba(255,255,255,0.25)}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
    .section-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);overflow:hidden}
    .card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
    .card-title{font-size:14px;font-weight:500;color:var(--text-dark);display:flex;align-items:center;gap:8px}
    .card-title i{color:var(--primary);font-size:13px}
    .card-body{padding:18px 20px}
    .detail-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
    .detail-row:last-child{border-bottom:none}
    .detail-label{font-size:12px;color:var(--text-light);width:120px;flex-shrink:0}
    .detail-value{font-size:13px;color:var(--text-dark);font-weight:500}
    .stat-mini-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .stat-mini{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center}
    .stat-mini-val{font-family:'Instrument Serif',serif;font-size:24px;color:var(--text-dark);line-height:1}
    .stat-mini-label{font-size:11px;color:var(--text-light);margin-top:3px}
    .history-list{display:flex;flex-direction:column;gap:8px}
    .history-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm)}
    .history-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
    .history-info{flex:1;min-width:0}
    .history-title{font-size:13px;font-weight:500;color:var(--text-dark)}
    .history-meta{font-size:11px;color:var(--text-light);margin-top:2px}
    .score-good{color:var(--success);font-family:'Instrument Serif',serif;font-size:18px}
    .score-mid{color:var(--warn);font-family:'Instrument Serif',serif;font-size:18px}
    .score-low{color:var(--error);font-family:'Instrument Serif',serif;font-size:18px}
    .skeleton{background:linear-gradient(90deg,var(--primary-pale) 25%,#e8e8ff 50%,var(--primary-pale) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .empty-state{text-align:center;padding:28px;color:var(--text-light);font-size:13px}
    .toast{position:fixed;bottom:28px;right:28px;background:var(--text-dark);color:#fff;padding:12px 20px;border-radius:var(--radius-sm);font-size:13px;z-index:300;display:none;box-shadow:var(--shadow-md)}
    .toast.show{display:flex;align-items:center;gap:8px}
    .toast.success{background:#0E9A7D}
    .toast.error{background:var(--error)}
    @media(max-width:800px){.sidebar{display:none}.main-content{margin-left:0}.topbar{padding:0 20px}.page-body{padding:20px}.grid-2{grid-template-columns:1fr}.profile-card{flex-direction:column;text-align:center}}
    @media(max-width:520px){.stat-mini-row{grid-template-columns:1fr 1fr}.profile-actions{justify-content:center}}
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <a href="admin-dashboard.html" class="sidebar-logo">
      <div class="sidebar-logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
      <span class="sidebar-logo-text">Study<span>Sync</span></span>
      <span class="admin-badge-side">Admin</span>
    </a>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Overview</span>
      <a href="admin-dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
      <a href="admin-analytics.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Analytics</a>
      <a href="admin-logs.html"      class="nav-item"><i class="fa-solid fa-file-lines"></i> Logs</a>
      <span class="nav-section-label">Users</span>
      <a href="admin-users.html"     class="nav-item active"><i class="fa-solid fa-users"></i> All Users</a>
      <span class="nav-section-label">Content</span>
      <a href="admin-quizzes.html"   class="nav-item"><i class="fa-solid fa-brain"></i> Quizzes</a>
      <a href="admin-questions.html" class="nav-item"><i class="fa-solid fa-circle-question"></i> Questions</a>
      <a href="admin-notes.html"     class="nav-item"><i class="fa-solid fa-book-open"></i> Notes</a>
      <span class="nav-section-label">Communication</span>
      <a href="admin-emails.html"    class="nav-item"><i class="fa-solid fa-envelope"></i> Emails</a>
      <span class="nav-section-label">System</span>
      <a href="admin-settings.html"  class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-user">
        <div class="admin-avatar" id="adminAvatar"></div>
        <div class="admin-info"><div class="admin-name" id="adminName">Admin</div><div class="admin-role">Administrator</div></div>
        <button class="logout-btn" id="logoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <a href="admin-users.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> All Users</a>
      </div>
      <div></div>
    </header>
    <div class="page-body">
      <!-- Profile card -->
      <div class="profile-card" id="profileCard">
        <div class="profile-avatar" id="profileAvatar"></div>
        <div class="profile-info">
          <div class="profile-name" id="profileName">Loading…</div>
          <div class="profile-email" id="profileEmail"></div>
          <div class="profile-meta" id="profileMeta"></div>
        </div>
        <div class="profile-actions">
          <button class="btn-action btn-neutral" id="btnResetPw"><i class="fa-solid fa-key"></i> Reset PW</button>
          <button class="btn-action btn-warn"    id="btnToggleActive">Deactivate</button>
          <button class="btn-action btn-danger"  id="btnDeleteUser"><i class="fa-solid fa-trash"></i> Delete</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="section-card" style="margin-bottom:20px;">
        <div class="card-header"><span class="card-title"><i class="fa-solid fa-chart-bar"></i> Academic Stats</span></div>
        <div class="card-body">
          <div class="stat-mini-row" id="statMiniRow">
            <div class="stat-mini"><div class="skeleton" style="height:24px;margin-bottom:6px;"></div><div class="stat-mini-label">Quizzes Taken</div></div>
            <div class="stat-mini"><div class="skeleton" style="height:24px;margin-bottom:6px;"></div><div class="stat-mini-label">Avg. Score</div></div>
            <div class="stat-mini"><div class="skeleton" style="height:24px;margin-bottom:6px;"></div><div class="stat-mini-label">Day Streak</div></div>
          </div>
        </div>
      </div>

      <div class="grid-2">
        <!-- Profile details -->
        <div class="section-card">
          <div class="card-header"><span class="card-title"><i class="fa-solid fa-user"></i> Profile Details</span></div>
          <div class="card-body" id="profileDetails"></div>
        </div>

        <!-- Subject performance -->
        <div class="section-card">
          <div class="card-header"><span class="card-title"><i class="fa-solid fa-chart-line"></i> Subject Performance</span></div>
          <div class="card-body" id="subjectPerf"></div>
        </div>
      </div>

      <!-- Quiz history -->
      <div class="section-card">
        <div class="card-header"><span class="card-title"><i class="fa-solid fa-clock-rotate-left"></i> Recent Quiz History</span></div>
        <div class="card-body"><div class="history-list" id="quizHistory"></div></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/admin-user-detail.js"></script>
</body>
</html>
